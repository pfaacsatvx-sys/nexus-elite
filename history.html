<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History | NEXUS ELITE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a017;--gold-light:#f3df85;--gold-dark:#b8860b;--dark:#0a0a0b;--dark-card:#121214;--dark-border:#2a2a2e;--text:#ffffff;--text-muted:#9ca3af;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--sidebar:200px}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
.gold-text{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--dark-card);border-right:1px solid var(--dark-border);padding:24px 0;z-index:100}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid var(--dark-border);margin-bottom:16px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;transition:.2s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{color:var(--gold);background:rgba(212,160,23,.05);border-left-color:var(--gold)}
.main{margin-left:var(--sidebar);min-height:100vh}
.header{position:sticky;top:0;background:rgba(10,10,11,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--dark-border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:16px;transition:.3s}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);color:#000;font-weight:700;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;transition:.3s;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.tab-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--dark-border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.3s;font-weight:600;font-size:13px}
.tab-btn.active{background:rgba(212,160,23,.1);border-color:var(--gold);color:var(--gold)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-success{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.3)}
.badge-warning{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.3)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.loading-spinner{width:20px;height:20px;border:2px solid rgba(212,160,23,.3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--dark-border);border-radius:3px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px">👑</div>
      <div>
        <div style="font-size:16px;font-weight:800;letter-spacing:1px" class="gold-text">NEXUS</div>
        <div style="font-size:8px;letter-spacing:3px;color:var(--gold-dark)">ELITE</div>
      </div>
    </a>
  </div>
  <nav>
    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
    <a href="packages.html" class="nav-item">📦 Packages</a>
    <a href="deposit.html" class="nav-item">⬇️ Deposit</a>
    <a href="withdraw.html" class="nav-item">⬆️ Withdraw</a>
    <a href="history.html" class="nav-item active">📜 History</a>
  </nav>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:16px;border-top:1px solid var(--dark-border)">
    <button onclick="logout()" class="nav-item" style="width:100%;border:none;background:none;cursor:pointer;color:var(--danger)">🚪 Logout</button>
  </div>
</aside>

<main class="main">
  <header class="header">
    <div><h1 style="font-size:20px;font-weight:700">Transaction History</h1></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text-muted)">Balance</div>
        <div style="font-size:18px;font-weight:800" class="gold-text" id="headerBalance"><span class="loading-spinner" style="width:16px;height:16px"></span></div>
      </div>
      <div style="width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000" id="userAvatar">U</div>
    </div>
  </header>

  <div style="padding:32px">
    <!-- Summary Cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px">
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;background:rgba(16,185,129,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">⬇️</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted)">Total Deposits</div>
            <div style="font-size:20px;font-weight:800;color:var(--success)" id="totalDeposits"><span class="loading-spinner" style="width:14px;height:14px"></span></div>
          </div>
        </div>
      </div>
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;background:rgba(239,68,68,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">⬆️</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted)">Total Withdrawals</div>
            <div style="font-size:20px;font-weight:800;color:var(--danger)" id="totalWithdrawals"><span class="loading-spinner" style="width:14px;height:14px"></span></div>
          </div>
        </div>
      </div>
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;background:rgba(212,160,23,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">📈</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted)">Total Profit</div>
            <div style="font-size:20px;font-weight:800;color:var(--gold)" id="totalProfit"><span class="loading-spinner" style="width:14px;height:14px"></span></div>
          </div>
        </div>
      </div>
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;background:rgba(245,158,11,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">⏳</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted)">Pending</div>
            <div style="font-size:20px;font-weight:800;color:var(--warning)" id="totalPending"><span class="loading-spinner" style="width:14px;height:14px"></span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="tab-btn active" onclick="setFilter('all')" id="filter-all">All</button>
      <button class="tab-btn" onclick="setFilter('deposit')" id="filter-deposit">Deposits</button>
      <button class="tab-btn" onclick="setFilter('withdrawal')" id="filter-withdrawal">Withdrawals</button>
      <button class="tab-btn" onclick="setFilter('profit')" id="filter-profit">Profits</button>
    </div>

    <!-- Transactions List -->
    <div class="card" id="transactionsList" style="padding:0">
      <div style="padding:48px;text-align:center">
        <span class="loading-spinner" style="width:40px;height:40px"></span>
        <p style="color:var(--text-muted);margin-top:12px">Loading transactions...</p>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { auth, db, checkAuth, signOut, doc, getDoc, collection, query, where, orderBy, onSnapshot, formatMoney, formatDate } from './firebase-config.js';

let currentUser = null;
let userData = null;
let currentFilter = 'all';
let unsubTransactions = null;

// Auth check
checkAuth(async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) {
        userData = userDoc.data();
        document.getElementById('userAvatar').textContent = (userData.name || 'U').charAt(0).toUpperCase();
        document.getElementById('headerBalance').textContent = formatMoney(userData.balance || 0);
    }

    loadTransactions();
});

function loadTransactions() {
    if (!currentUser) return;

    const q = query(
        collection(db, 'transactions'),
        where('userId', '==', currentUser.uid),
        orderBy('date', 'desc')
    );

    unsubTransactions = onSnapshot(q, (snapshot) => {
        const txs = [];
        snapshot.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
        renderTransactions(txs);
    }, (err) => {
        console.error('Transactions error:', err);
        document.getElementById('transactionsList').innerHTML = `
            <div style="padding:48px;text-align:center;color:var(--text-muted)">Unable to load transactions</div>
        `;
    });
}

function renderTransactions(allTxs) {
    // Calculate totals
    const deposits = allTxs.filter(t => t.type === 'deposit' && t.status === 'approved').reduce((s, t) => s + (t.amount || 0), 0);
    const withdrawals = allTxs.filter(t => t.type === 'withdrawal' && t.status === 'approved').reduce((s, t) => s + (t.amount || 0), 0);
    const profits = allTxs.filter(t => t.type === 'profit' && t.status === 'completed').reduce((s, t) => s + (t.amount || 0), 0);
    const pending = allTxs.filter(t => t.status === 'pending').reduce((s, t) => s + (t.amount || 0), 0);

    document.getElementById('totalDeposits').textContent = formatMoney(deposits);
    document.getElementById('totalWithdrawals').textContent = formatMoney(withdrawals);
    document.getElementById('totalProfit').textContent = formatMoney(profits);
    document.getElementById('totalPending').textContent = formatMoney(pending);

    // Filter
    const filtered = currentFilter === 'all' ? allTxs : allTxs.filter(t => t.type === currentFilter);

    const container = document.getElementById('transactionsList');
    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-muted)">No transactions found</div>';
        return;
    }

    const icons = {deposit:'⬇️', withdrawal:'⬆️', profit:'📈', referral:'👥'};
    const colors = {deposit:'var(--success)', withdrawal:'var(--danger)', profit:'var(--gold)', referral:'#3b82f6'};

    container.innerHTML = filtered.map(tx => {
        const txDate = tx.date ? (tx.date.toDate ? tx.date.toDate() : new Date(tx.date)) : new Date();
        return `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--dark-border);transition:.2s" onmouseover="this.style.background='rgba(212,160,23,.03)'" onmouseout="this.style.background='transparent'">
                <div style="display:flex;align-items:center;gap:14px">
                    <div style="width:48px;height:48px;border-radius:50%;background:${colors[tx.type] || 'var(--text)'}15;display:flex;align-items:center;justify-content:center;font-size:22px">${icons[tx.type] || '💰'}</div>
                    <div>
                        <div style="font-weight:600;text-transform:capitalize">${tx.type || 'Transaction'}</div>
                        <div style="font-size:12px;color:var(--text-muted)">${tx.description || formatDate(txDate)}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:700;color:${colors[tx.type] || 'var(--text)'}">${tx.type === 'withdrawal' ? '-' : '+'}${formatMoney(tx.amount)}</div>
                    <span class="badge badge-${tx.status === 'approved' || tx.status === 'completed' ? 'success' : tx.status === 'pending' ? 'warning' : 'danger'}" style="margin-top:4px;text-transform:capitalize">${tx.status || 'pending'}</span>
                </div>
            </div>
        `;
    }).join('');
}

window.setFilter = (f) => {
    currentFilter = f;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + f).classList.add('active');
    // Re-render will happen automatically via onSnapshot
};

window.logout = async () => {
    if (unsubTransactions) unsubTransactions();
    try {
        await signOut(auth);
        window.location.href = 'login.html';
    } catch (err) {
        console.error('Logout error:', err);
    }
};

// Cleanup
window.addEventListener('beforeunload', () => {
    if (unsubTransactions) unsubTransactions();
});
</script>
</body>
</html>
