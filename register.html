<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | NEXUS ELITE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a017;--gold-light:#f3df85;--gold-dark:#b8860b;--dark:#0a0a0b;--dark-card:#121214;--dark-border:#2a2a2e;--text:#ffffff;--text-muted:#9ca3af;--success:#10b981;--danger:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(212,160,23,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,160,23,.03) 1px,transparent 1px);background-size:50px 50px}
.glow-1{position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(212,160,23,.08),transparent 70%);border-radius:50%}
.glow-2{position:absolute;bottom:-100px;left:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(212,160,23,.05),transparent 70%);border-radius:50%}
.card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:20px;padding:48px;width:100%;max-width:420px;position:relative;z-index:1}
.gold-text{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
input{background:#0a0a0b;border:1px solid var(--dark-border);color:var(--text);padding:14px 16px;border-radius:10px;font-size:14px;width:100%;outline:none;transition:.3s;font-family:inherit}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.1)}
::placeholder{color:#555}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);color:#000;font-weight:700;padding:14px;border-radius:10px;border:none;cursor:pointer;transition:all .3s;font-size:15px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(212,160,23,.3)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-outline{border:1px solid rgba(212,160,23,.4);color:var(--gold);background:transparent;padding:14px;border-radius:10px;cursor:pointer;transition:all .3s;font-size:15px;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-outline:hover{background:rgba(212,160,23,.1)}
.btn-outline:disabled{opacity:.6;cursor:not-allowed}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--danger);padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--success);padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.loading-spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="card">
  <div style="text-align:center;margin-bottom:32px">
    <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px">👑</div>
    <h1 style="font-size:24px;font-weight:800" class="gold-text">Create Account</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-top:4px">Join the elite circle of investors</p>
  </div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <form id="registerForm" style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
    </div>
    <div>
      <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div>
      <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px">Password</label>
      <input type="password" id="password" placeholder="Create a strong password (min 6 chars)" required minlength="6">
    </div>
    <div>
      <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
    </div>
    <div>
      <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px">Referral Code (Optional)</label>
      <input type="text" id="referral" placeholder="Enter referral code">
    </div>
    <button type="submit" class="btn-gold" style="margin-top:8px" id="registerBtn">
      <span id="btnText">Create Account →</span>
    </button>
  </form>

  <div style="display:flex;align-items:center;gap:16px;margin:24px 0">
    <div style="flex:1;height:1px;background:var(--dark-border)"></div>
    <span style="color:#555;font-size:12px">OR</span>
    <div style="flex:1;height:1px;background:var(--dark-border)"></div>
  </div>

  <button class="btn-outline" onclick="googleRegister()" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="googleText">Sign up with Google</span>
  </button>

  <p style="text-align:center;margin-top:24px;color:var(--text-muted);font-size:14px">
    Already have an account? <a href="login.html" style="color:var(--gold);text-decoration:none;font-weight:600">Sign in</a>
  </p>
</div>

<script type="module">
import { auth, db, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, setDoc, doc, getDoc, serverTimestamp } from './firebase-config.js';

function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('success');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error').style.display = 'none';
}

function setLoading(isLoading) {
    const registerBtn = document.getElementById('registerBtn');
    const googleBtn = document.getElementById('googleBtn');
    const btnText = document.getElementById('btnText');
    const googleText = document.getElementById('googleText');

    registerBtn.disabled = isLoading;
    googleBtn.disabled = isLoading;

    if (isLoading) {
        btnText.innerHTML = '<span class="loading-spinner" style="border-color:rgba(0,0,0,.2);border-top-color:#000"></span> Creating...';
        googleText.innerHTML = '<span class="loading-spinner" style="border-color:rgba(212,160,23,.3);border-top-color:var(--gold)"></span> Connecting...';
    } else {
        btnText.textContent = 'Create Account →';
        googleText.textContent = 'Sign up with Google';
    }
}

// Email/Password Registration
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(true);

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const referral = document.getElementById('referral').value.trim();

    if (password !== confirm) {
        showError('Passwords do not match');
        setLoading(false);
        return;
    }

    if (password.length < 6) {
        showError('Password must be at least 6 characters');
        setLoading(false);
        return;
    }

    try {
        // Create Firebase Auth user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Create user document in Firestore
        const userData = {
            uid: user.uid,
            name: name,
            email: email,
            role: 'user',
            balance: 0,
            invested: 0,
            profit: 0,
            withdrawn: 0,
            referralCode: 'NX' + Math.random().toString(36).substr(2, 6).toUpperCase(),
            referredBy: referral || null,
            status: 'active',
            createdAt: serverTimestamp()
        };

        await setDoc(doc(db, 'users', user.uid), userData);

        showSuccess('Account created successfully! Redirecting...');

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);

    } catch (error) {
        console.error('Registration error:', error);
        let msg = 'Registration failed. Please try again.';
        if (error.code === 'auth/email-already-in-use') msg = 'This email is already registered.';
        if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
        if (error.code === 'auth/weak-password') msg = 'Password is too weak.';
        showError(msg);
        setLoading(false);
    }
});

// Google Registration
window.googleRegister = async () => {
    setLoading(true);
    const provider = new GoogleAuthProvider();

    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Check if user already exists
        const userDoc = await getDoc(doc(db, 'users', user.uid));

        if (userDoc.exists()) {
            showSuccess('Welcome back! Redirecting...');
        } else {
            // Create new user
            const userData = {
                uid: user.uid,
                name: user.displayName || 'User',
                email: user.email,
                role: 'user',
                balance: 0,
                invested: 0,
                profit: 0,
                withdrawn: 0,
                referralCode: 'NX' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                status: 'active',
                createdAt: serverTimestamp()
            };

            await setDoc(doc(db, 'users', user.uid), userData);
            showSuccess('Account created! Redirecting...');
        }

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);

    } catch (error) {
        console.error('Google signup error:', error);
        let msg = 'Google signup failed. Please try again.';
        if (error.code === 'auth/popup-closed-by-user') msg = 'Signup cancelled.';
        if (error.code === 'auth/popup-blocked') msg = 'Popup blocked. Please allow popups.';
        showError(msg);
        setLoading(false);
    }
};
</script>
</body>
</html>
