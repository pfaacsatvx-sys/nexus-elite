<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packages | NEXUS ELITE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a017;--gold-light:#f3df85;--gold-dark:#b8860b;--dark:#0a0a0b;--dark-card:#121214;--dark-border:#2a2a2e;--text:#ffffff;--text-muted:#9ca3af;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--sidebar:200px}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
.gold-text{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--dark-card);border-right:1px solid var(--dark-border);padding:24px 0;z-index:100}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid var(--dark-border);margin-bottom:16px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;transition:.2s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{color:var(--gold);background:rgba(212,160,23,.05);border-left-color:var(--gold)}
.main{margin-left:var(--sidebar);min-height:100vh}
.header{position:sticky;top:0;background:rgba(10,10,11,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--dark-border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:16px;transition:.3s}
.card:hover{border-color:rgba(212,160,23,.2);transform:translateY(-4px)}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);color:#000;font-weight:700;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;transition:.3s;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(212,160,23,.3)}
.btn-outline{border:1px solid rgba(212,160,23,.4);color:var(--gold);background:transparent;padding:10px 20px;border-radius:10px;cursor:pointer;transition:.3s;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{background:rgba(212,160,23,.1)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.modal.active{display:flex}
.modal-content{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:20px;padding:32px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.loading-spinner{width:20px;height:20px;border:2px solid rgba(212,160,23,.3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--dark-border);border-radius:3px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px">👑</div>
      <div>
        <div style="font-size:16px;font-weight:800;letter-spacing:1px" class="gold-text">NEXUS</div>
        <div style="font-size:8px;letter-spacing:3px;color:var(--gold-dark)">ELITE</div>
      </div>
    </a>
  </div>
  <nav>
    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
    <a href="packages.html" class="nav-item active">📦 Packages</a>
    <a href="deposit.html" class="nav-item">⬇️ Deposit</a>
    <a href="withdraw.html" class="nav-item">⬆️ Withdraw</a>
    <a href="history.html" class="nav-item">📜 History</a>
  </nav>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:16px;border-top:1px solid var(--dark-border)">
    <button onclick="logout()" class="nav-item" style="width:100%;border:none;background:none;cursor:pointer;color:var(--danger)">🚪 Logout</button>
  </div>
</aside>

<main class="main">
  <header class="header">
    <div><h1 style="font-size:20px;font-weight:700">Investment Packages</h1></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text-muted)">Balance</div>
        <div style="font-size:18px;font-weight:800" class="gold-text" id="headerBalance"><span class="loading-spinner" style="width:16px;height:16px"></span></div>
      </div>
      <div style="width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000" id="userAvatar">U</div>
    </div>
  </header>

  <div style="padding:32px">
    <div style="text-align:center;margin-bottom:48px">
      <h2 style="font-size:32px;font-weight:800;margin-bottom:12px">Choose Your <span class="gold-text">Package</span></h2>
      <p style="color:var(--text-muted);max-width:500px;margin:0 auto">Select the perfect investment tier that aligns with your financial goals</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:48px" id="packagesGrid">
      <div class="card" style="padding:48px;text-align:center;grid-column:1/-1">
        <span class="loading-spinner" style="width:40px;height:40px"></span>
        <p style="color:var(--text-muted);margin-top:12px">Loading packages...</p>
      </div>
    </div>

    <!-- Comparison Table -->
    <div class="card" style="padding:32px;overflow-x:auto">
      <h3 style="font-size:20px;font-weight:700;margin-bottom:24px">Package Comparison</h3>
      <table style="width:100%;border-collapse:collapse;font-size:14px">
        <thead>
          <tr style="border-bottom:1px solid var(--dark-border)">
            <th style="text-align:left;padding:12px;color:var(--text-muted);font-weight:500">Feature</th>
            <th style="text-align:center;padding:12px;color:var(--gold)">Starter</th>
            <th style="text-align:center;padding:12px;color:var(--gold)">Bronze</th>
            <th style="text-align:center;padding:12px;color:var(--gold)">Silver</th>
            <th style="text-align:center;padding:12px;color:var(--gold)">Gold</th>
            <th style="text-align:center;padding:12px;color:var(--gold)">Platinum</th>
          </tr>
        </thead>
        <tbody id="comparisonTable"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Package Modal -->
<div class="modal" id="packageModal">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h3 style="font-size:22px;font-weight:800" class="gold-text" id="modalTitle">Package</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
import { auth, db, checkAuth, signOut, doc, getDoc, formatMoney } from './firebase-config.js';

let currentUser = null;
let userData = null;

const packages = [
  {id:'pkg-1',name:'Starter',price:11,return:25,duration:30,min:11,max:100,features:['Daily profit distribution','25% monthly return','30-day duration','Email support'],color:'linear-gradient(135deg,#6b7280,#374151)',icon:'⚡',tier:'starter'},
  {id:'pkg-2',name:'Bronze',price:50,return:27,duration:60,min:50,max:500,features:['Daily profit distribution','27% monthly return','60-day duration','Priority email support','3% referral bonus'],color:'linear-gradient(135deg,#b45309,#78350f)',icon:'🏅',tier:'bronze'},
  {id:'pkg-3',name:'Silver',price:100,return:30,duration:90,min:100,max:1000,features:['Daily profit distribution','30% monthly return','90-day duration','24/7 chat support','5% referral bonus','Weekly profit reports'],color:'linear-gradient(135deg,#94a3b8,#475569)',icon:'👑',tier:'silver',popular:true},
  {id:'pkg-4',name:'Gold',price:150,return:33,duration:120,min:150,max:5000,features:['Daily profit distribution','33% monthly return','120-day duration','Dedicated account manager','7% referral bonus','Daily profit reports'],color:'linear-gradient(135deg,#eab308,#a16207)',icon:'💎',tier:'gold'},
  {id:'pkg-5',name:'Platinum',price:200,return:35,duration:180,min:200,max:50000,features:['Daily profit distribution','35% monthly return','180-day duration','Personal wealth advisor','10% referral bonus','Instant withdrawals','Exclusive insights'],color:'linear-gradient(135deg,#22d3ee,#1d4ed8)',icon:'💠',tier:'platinum'}
];

// Auth check
checkAuth(async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) {
        userData = userDoc.data();
        document.getElementById('userAvatar').textContent = (userData.name || 'U').charAt(0).toUpperCase();
        document.getElementById('headerBalance').textContent = formatMoney(userData.balance || 0);
    }

    renderPackages();
    renderComparison();
});

function renderPackages() {
    const grid = document.getElementById('packagesGrid');
    grid.innerHTML = packages.map(pkg => `
        <div class="card" style="padding:24px;position:relative;${pkg.popular?'border-color:rgba(212,160,23,.5);transform:scale(1.03)':''}">
            ${pkg.popular?'<div style="position:absolute;top:0;right:0;background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:4px 14px;border-radius:0 16px 0 16px">POPULAR</div>':''}
            <div style="width:56px;height:56px;background:${pkg.color};border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px">${pkg.icon}</div>
            <h3 style="font-size:20px;font-weight:800;margin-bottom:4px">${pkg.name}</h3>
            <p style="font-size:12px;color:var(--text-muted);text-transform:capitalize;margin-bottom:16px">${pkg.tier} Tier</p>
            <div style="font-size:32px;font-weight:800" class="gold-text">$${pkg.price}</div>
            <div style="background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:16px;text-align:center;margin:16px 0">
                <div style="font-size:28px;font-weight:800;color:var(--gold)">${pkg.return}%</div>
                <div style="font-size:12px;color:var(--text-muted)">Monthly Return</div>
            </div>
            <div style="margin-bottom:20px">
                ${pkg.features.map(f=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:var(--text-muted)"><span style="color:var(--gold)">✓</span>${f}</div>`).join('')}
            </div>
            <button class="btn-gold" style="width:100%;justify-content:center" onclick="selectPackage('${pkg.id}')">Select Package</button>
        </div>
    `).join('');
}

function renderComparison() {
    const tbody = document.getElementById('comparisonTable');
    const rows = [
        ['Price',...packages.map(p=>formatMoney(p.price))],
        ['Monthly Return',...packages.map(p=>p.return+'%')],
        ['Duration',...packages.map(p=>p.duration+' days')],
        ['Min Deposit',...packages.map(p=>'$'+p.min)],
        ['Max Deposit',...packages.map(p=>'$'+p.max.toLocaleString())],
        ['Referral Bonus',...packages.map(p=>{const m=p.features.find(f=>f.includes('referral'));return m?m.match(/\d+%/)[0]:'—'})]
    ];
    tbody.innerHTML = rows.map((row,i) => `
        <tr style="border-bottom:1px solid var(--dark-border);${i%2===0?'background:rgba(255,255,255,.02)':''}">
            <td style="padding:12px;color:var(--text-muted)">${row[0]}</td>
            ${row.slice(1).map(v=>`<td style="padding:12px;text-align:center;font-weight:600;color:${i===1?'var(--success)':'var(--text)'}">${v}</td>`).join('')}
        </tr>
    `).join('');
}

window.selectPackage = (id) => {
    const pkg = packages.find(p=>p.id===id);
    document.getElementById('modalTitle').textContent = pkg.name;
    document.getElementById('modalBody').innerHTML = `
        <div style="background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.2);border-radius:12px;padding:24px;text-align:center;margin-bottom:24px">
            <p style="font-size:14px;color:var(--text-muted)">Investment Amount</p>
            <p style="font-size:36px;font-weight:800" class="gold-text">$${pkg.price}</p>
            <p style="color:var(--success);font-weight:600">${pkg.return}% monthly return</p>
        </div>
        <div style="margin-bottom:24px">
            <h4 style="font-weight:700;margin-bottom:12px">Package Features:</h4>
            ${pkg.features.map(f=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px"><span style="color:var(--gold)">✓</span>${f}</div>`).join('')}
        </div>
        <a href="deposit.html?package=${pkg.id}" class="btn-gold" style="width:100%;justify-content:center;padding:16px;font-size:16px">Proceed to Deposit →</a>
    `;
    document.getElementById('packageModal').classList.add('active');
};

window.closeModal = () => {
    document.getElementById('packageModal').classList.remove('active');
};

window.logout = async () => {
    try {
        await signOut(auth);
        window.location.href = 'login.html';
    } catch (err) {
        console.error('Logout error:', err);
    }
};
</script>
</body>
</html>
